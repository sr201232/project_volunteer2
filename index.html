<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ajmk.kr</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      background: #fff;
      color: #111;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      font-size: clamp(24px, 5vw, 56px);
      font-weight: 700;
      line-height: 1.35;
      text-align: center;
      word-break: keep-all;
    }
  </style>
