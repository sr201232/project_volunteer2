<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상암동 실시간 대기오염정보</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #667085;
      --line: #d9dee7;
      --good: #1976d2;
      --normal: #16843a;
      --bad: #e07b00;
      --very-bad: #c62828;
      --unknown: #697386;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(25, 118, 210, 0.12), transparent 34rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 42%);
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .status-pill {
      flex: 0 0 auto;
      min-width: 96px;
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      background: var(--unknown);
      font-weight: 800;
      text-align: center;
      box-shadow: 0 10px 24px rgba(23, 32, 42, 0.12);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 44px rgba(31, 41, 55, 0.08);
    }

    .summary {
      padding: 28px;
    }

    .summary-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 22px;
    }

    .score {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .score strong {
      font-size: clamp(56px, 10vw, 96px);
      line-height: 0.9;
      letter-spacing: 0;
    }

    .score span {
      color: var(--muted);
      font-weight: 700;
    }

    .time {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      text-align: right;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-height: 126px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .metric-name {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .metric-value {
      margin: 0;
      font-size: 28px;
      font-weight: 850;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .metric-unit {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .metric-grade {
      display: inline-flex;
      margin-top: 12px;
      padding: 5px 9px;
      border-radius: 999px;
      color: #fff;
      background: var(--unknown);
      font-size: 12px;
      font-weight: 800;
    }

    aside {
      padding: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      background: #fff;
      font: inherit;
    }

    button {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      background: #17202a;
      font: inherit;
      font-weight: 850;
      cursor: pointer;
    }

    button:disabled {
      cursor: progress;
      opacity: 0.7;
    }

    .note {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .message {
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fbfcfe;
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-line;
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      header,
      .summary-top {
        display: grid;
      }

      .status-pill,
      .time {
        justify-self: start;
        text-align: left;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 520px) {
      main {
        width: min(100% - 22px, 1040px);
        padding-top: 24px;
      }

      .summary {
        padding: 18px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>서울특별시 마포구 상암동 대기오염정보</h1>
        <p class="subtitle">한국환경공단 에어코리아 실시간 측정자료를 조회합니다.</p>
      </div>
      <div id="overallGrade" class="status-pill">조회 전</div>
    </header>

    <section class="layout">
      <div class="panel summary">
        <div class="summary-top">
          <div>
            <div class="score">
              <strong id="khaiValue">--</strong>
              <span>통합대기환경지수</span>
            </div>
          </div>
          <div class="time">
            <div id="stationName">측정소: 상암동</div>
            <div id="dataTime">측정 시각: --</div>
          </div>
        </div>

        <div class="grid" id="metricGrid"></div>
      </div>

      <aside class="panel">
        <div class="field">
          <label for="serviceKey">공공데이터포털 인증키</label>
          <input id="serviceKey" type="password" autocomplete="off" placeholder="Decoding 인증키를 입력하세요" />
        </div>
        <button id="refreshButton" type="button">실시간 정보 조회</button>
        <p class="note">
          GitHub에 올릴 때 인증키를 HTML에 직접 넣으면 누구나 볼 수 있습니다.
          공개 저장소라면 이 입력 방식이 더 안전합니다.
        </p>
        <div id="message" class="message">인증키를 입력한 뒤 조회하세요.</div>
      </aside>
    </section>

    <footer>
      제공: 한국환경공단 에어코리아 대기오염정보 조회 서비스.
      자료는 측정소 상황에 따라 지연되거나 일부 항목이 비어 있을 수 있습니다.
    </footer>
  </main>

  <script>
    /*
      GitHub Pages에서 매번 키를 입력하지 않으려면 아래 따옴표 안에
      공공데이터포털의 "Decoding" 인증키를 넣으세요.
      예: const SERVICE_KEY = "여기에_인증키";
    */
    const SERVICE_KEY = "";
    const AREA_LABEL = "서울특별시 마포구 상암동";
    const STATION_NAMES = ["상암동", "마포구"];
    const API_URL = "https://apis.data.go.kr/B552584/ArpltnInforInqireSvc/getMsrstnAcctoRltmMesureDnsty";

    const metrics = [
      { key: "pm10Value", gradeKey: "pm10Grade", label: "미세먼지 PM10", unit: "ug/m3" },
      { key: "pm25Value", gradeKey: "pm25Grade", label: "초미세먼지 PM2.5", unit: "ug/m3" },
      { key: "o3Value", gradeKey: "o3Grade", label: "오존 O3", unit: "ppm" },
      { key: "no2Value", gradeKey: "no2Grade", label: "이산화질소 NO2", unit: "ppm" },
      { key: "coValue", gradeKey: "coGrade", label: "일산화탄소 CO", unit: "ppm" },
      { key: "so2Value", gradeKey: "so2Grade", label: "아황산가스 SO2", unit: "ppm" }
    ];

    const gradeMap = {
      "1": { text: "좋음", color: "var(--good)" },
      "2": { text: "보통", color: "var(--normal)" },
      "3": { text: "나쁨", color: "var(--bad)" },
      "4": { text: "매우 나쁨", color: "var(--very-bad)" }
    };

    const elements = {
      serviceKey: document.querySelector("#serviceKey"),
      refreshButton: document.querySelector("#refreshButton"),
      message: document.querySelector("#message"),
      metricGrid: document.querySelector("#metricGrid"),
      overallGrade: document.querySelector("#overallGrade"),
      khaiValue: document.querySelector("#khaiValue"),
      stationName: document.querySelector("#stationName"),
      dataTime: document.querySelector("#dataTime")
    };

    function getGradeInfo(grade) {
      return gradeMap[String(grade)] || { text: "정보 없음", color: "var(--unknown)" };
    }

    function displayMessage(text) {
      elements.message.textContent = text;
    }

    function renderEmptyMetrics() {
      elements.metricGrid.innerHTML = metrics.map((metric) => `
        <article class="metric">
          <p class="metric-name">${metric.label}</p>
          <p class="metric-value">--</p>
          <div class="metric-unit">${metric.unit}</div>
          <span class="metric-grade">정보 없음</span>
        </article>
      `).join("");
    }

    function renderData(item) {
      const overall = getGradeInfo(item.khaiGrade);
      elements.overallGrade.textContent = overall.text;
      elements.overallGrade.style.background = overall.color;
      elements.khaiValue.textContent = item.khaiValue && item.khaiValue !== "-" ? item.khaiValue : "--";
      elements.stationName.textContent = `측정소: ${item.stationName || STATION_NAMES[0]}`;
      elements.dataTime.textContent = `측정 시각: ${item.dataTime || "--"}`;

      elements.metricGrid.innerHTML = metrics.map((metric) => {
        const grade = getGradeInfo(item[metric.gradeKey]);
        const value = item[metric.key] && item[metric.key] !== "-" ? item[metric.key] : "--";

        return `
          <article class="metric">
            <p class="metric-name">${metric.label}</p>
            <p class="metric-value">${value}</p>
            <div class="metric-unit">${metric.unit}</div>
            <span class="metric-grade" style="background: ${grade.color}">${grade.text}</span>
          </article>
        `;
      }).join("");
    }

    function readServiceKey() {
      return SERVICE_KEY.trim() || elements.serviceKey.value.trim() || localStorage.getItem("airKoreaServiceKey") || "";
    }

    async function requestStationData(stationName, serviceKey) {
      const params = new URLSearchParams({
        serviceKey,
        returnType: "json",
        numOfRows: "1",
        pageNo: "1",
        stationName,
        dataTerm: "DAILY",
        ver: "1.4"
      });

      const response = await fetch(`${API_URL}?${params.toString()}`);
      if (!response.ok) {
        throw new Error(`API 응답 오류: ${response.status}`);
      }

      const data = await response.json();
      const header = data.response && data.response.header;
      const body = data.response && data.response.body;

      if (header && header.resultCode !== "00") {
        throw new Error(`${header.resultMsg || "API 오류"} (${header.resultCode})`);
      }

      return body && body.items && body.items[0];
    }

    async function fetchAirQuality() {
      const serviceKey = readServiceKey();

      if (!serviceKey) {
        displayMessage("공공데이터포털 인증키를 입력하세요.");
        return;
      }

      localStorage.setItem("airKoreaServiceKey", serviceKey);
      elements.refreshButton.disabled = true;
      elements.refreshButton.textContent = "조회 중";
      displayMessage("에어코리아에서 최신 측정값을 불러오는 중입니다.");

      try {
        let item = null;
        let usedStationName = "";

        for (const stationName of STATION_NAMES) {
          item = await requestStationData(stationName, serviceKey);
          if (item) {
            usedStationName = stationName;
            break;
          }
        }

        if (!item) {
          throw new Error(`측정소 자료를 찾지 못했습니다. STATION_NAMES 값에 ${AREA_LABEL} 주변 측정소명을 추가하세요.`);
        }

        renderData(item);
        displayMessage(`${AREA_LABEL} 기준으로 조회했습니다.\n사용한 측정소명: ${item.stationName || usedStationName}`);
      } catch (error) {
        displayMessage(
          `${error.message}\n\n브라우저에서 CORS 오류가 발생하면 GitHub Pages 단독으로는 직접 호출이 막힌 것입니다. 이 경우 Cloudflare Worker, Vercel Functions 같은 짧은 프록시가 필요합니다.`
        );
      } finally {
        elements.refreshButton.disabled = false;
        elements.refreshButton.textContent = "실시간 정보 조회";
      }
    }

    elements.refreshButton.addEventListener("click", fetchAirQuality);

    const savedKey = localStorage.getItem("airKoreaServiceKey");
    if (savedKey) {
      elements.serviceKey.value = savedKey;
    }

    renderEmptyMetrics();
    if (SERVICE_KEY || savedKey) {
      fetchAirQuality();
    }
  </script>
</body>
</html>
